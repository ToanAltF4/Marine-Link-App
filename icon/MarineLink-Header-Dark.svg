<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="1440" height="400">

  <defs>
    <linearGradient id="h08rp-bg" x1="18%" y1="0%" x2="82%" y2="100%">
      <stop offset="0%"  stop-color="#052449"/>
      <stop offset="42%" stop-color="#0B4F8F"/>
      <stop offset="100%" stop-color="#1E84C6"/>
    </linearGradient>
    <radialGradient id="h08rp-glow" cx="28%" cy="20%" r="85%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="h08rp-vignette" cx="50%" cy="100%" r="80%">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="h08rp-mstroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="55%"  stop-color="#DCF1FB"/>
      <stop offset="100%" stop-color="#7FC8E6"/>
    </linearGradient>
    <linearGradient id="h08rp-mstroke2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="h08rp-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- circle badge on the left -->
  <g transform="translate(8 8)">
    <circle cx="92" cy="92" r="90" fill="url(#h08rp-bg)"/>
    <circle cx="92" cy="92" r="90" fill="url(#h08rp-glow)"/>
    <circle cx="92" cy="92" r="90" fill="url(#h08rp-vignette)"/>
    <circle cx="92" cy="92" r="84" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
    <g transform="translate(-28 -28) scale(1)">

    <!-- ocean horizon (behind M) -->
    <g fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.45">
      <path d="M50 188 C70 180, 88 196, 108 188 C128 180, 148 196, 168 188 C184 182, 196 192, 196 192"/>
      <path d="M64 204 C80 198, 98 212, 114 204 C130 198, 150 212, 166 204" opacity="0.65"/>
    </g>

    <!-- bubbles -->
    <g fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.7">
      <circle cx="56" cy="60" r="3"/>
      <circle cx="184" cy="52" r="4"/>
      <circle cx="200" cy="70" r="2"/>
      <circle cx="46" cy="80" r="1.6"/>
    </g>

    <!-- main M (wave double-arch) -->
    <g fill="none" stroke="url(#h08rp-mstroke)" stroke-width="11.5" stroke-linecap="round" stroke-linejoin="round"
       filter="url(#h08rp-shadow)">
      <path d="M50 168 C50 112, 70 76, 92 88 C108 96, 114 116, 122 124 C130 116, 136 96, 152 88 C174 76, 194 112, 194 168"/>
    </g>

    <!-- inner highlight stroke (gives the M a "lit" ridge) -->

    <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.65">
      <path d="M58 152 C60 116, 74 92, 90 100"/>
      <path d="M154 100 C170 92, 184 116, 186 152"/>
    </g>

    <!-- foam droplets on each wave peak -->
    <g fill="#ffffff">
      <circle cx="83" cy="80" r="3.2"/>
      <circle cx="161" cy="80" r="3.2"/>
      <circle cx="89" cy="72" r="1.6" opacity="0.8"/>
      <circle cx="155" cy="72" r="1.6" opacity="0.8"/>
    </g>

    <!-- cute fish nestled in the M's valley -->
    <g>
      <path d="M104 144 C104 139, 114 135, 122 137 C128 138, 132 141, 132 144 C132 147, 128 151, 122 152 C114 154, 104 149, 104 144 Z" fill="#ffffff"/>
      <path d="M104 144 C100 142, 96 141, 92 142 C92 146, 92 148, 92 148 C96 148, 100 146, 104 144 Z" fill="#ffffff"/>
      <circle cx="127" cy="142" r="1.6" fill="#052449"/>
      <path d="M120 148 C122 150, 126 150, 128 148" fill="none" stroke="#052449" stroke-width="1" stroke-linecap="round"/>
      <path d="M111 140 L111 148" stroke="#052449" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    </g>

    </g>
  </g>
  <!-- wordmark -->
  <g font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif">
    <text x="220" y="96" font-size="74" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Marine<tspan fill="#5BC8E8">Link</tspan></text>
    <!-- dot over the "i" in Marine — replaced with a droplet -->
    <circle cx="333" cy="42" r="6" fill="#5BC8E8"/>
    <!-- wave underline under the L of Link -->
    <path d="M444 112 C460 104, 478 120, 496 112 C514 104, 532 120, 548 112" fill="none" stroke="#5BC8E8" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- tagline -->
    <text x="222" y="138" font-size="15" font-weight="600" fill="#A9DEF9" letter-spacing="3.4">KẾT NỐI HẢI SẢN — VƯƠN TẦM THỊ TRƯỜNG</text>
    <text x="222" y="164" font-size="13" font-weight="400" fill="#cfe0ee">Nhà phân phối hải sản khô hàng đầu cho đại lý sỉ · EST. 2026</text>
  </g>
</svg>